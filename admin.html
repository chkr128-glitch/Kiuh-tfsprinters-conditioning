<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>コンディション管理 - 管理者画面</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f3f4f6; color: #333; margin: 0; padding: 0; line-height: 1.6; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        header { background-color: #1e3a8a; color: white; padding: 15px 20px; text-align: center; font-size: 20px; font-weight: bold; position: sticky; top: 0; z-index: 100; }
        .card { background-color: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .section-title { font-size: 18px; font-weight: bold; color: #1e3a8a; border-bottom: 2px solid #e5e7eb; padding-bottom: 8px; margin-bottom: 15px; margin-top: 0; }
        
        select, input[type="text"] { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 16px; margin-bottom: 10px; box-sizing: border-box; }
        
        .dashboard-summary { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .summary-card { flex: 1; min-width: 150px; background: white; border-radius: 12px; padding: 15px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-top: 4px solid #d1d5db; }
        .summary-title { font-size: 12px; font-weight: bold; color: #6b7280; margin-bottom: 5px; }
        .summary-value { font-size: 28px; font-weight: bold; }
        .alert-card { border-top-color: #dc2626; } .alert-card .summary-value { color: #dc2626; } 
        .warning-card { border-top-color: #d97706; } .warning-card .summary-value { color: #d97706; } 
        .info-card { border-top-color: #2563eb; } .info-card .summary-value { color: #2563eb; } 
        
        .missing-list { font-size: 12px; color: #6b7280; margin-top: 5px; min-height: 18px; }

        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; font-size: 14px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e5e7eb; }
        th { background-color: #f3f4f6; color: #4b5563; font-weight: bold; }
        tr:hover { background-color: #f9fafb; }
        .alert-text { color: #dc2626; font-weight: bold; }
        .tag-text { background-color: #fef08a; color: #b45309; padding: 2px 6px; border-radius: 4px; font-size: 11px; margin-right: 4px; display: inline-block;}
        
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .status-badge { font-size: 12px; padding: 4px 8px; border-radius: 12px; font-weight: normal; margin-left: 10px; vertical-align: middle; }
        .status-local { background-color: #6b7280; color: white; }
        .status-cloud { background-color: #10b981; color: white; }

        /* 【追加】操作ボタンのデザイン */
        .btn { padding: 10px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; border: none; transition: background-color 0.2s; font-size: 14px; }
        .btn-danger { background-color: #ef4444; color: white; }
        .btn-danger:hover { background-color: #dc2626; }
        .btn-success { background-color: #10b981; color: white; display: flex; align-items: center; gap: 5px; }
        .btn-success:hover { background-color: #059669; }

        /* 【追加】フィルターエリア */
        .filter-area { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .filter-area input { flex: 1; min-width: 200px; margin-bottom: 0; }
    </style>
</head>
<body>

    <header>
        Team Condition - ダッシュボード <span id="connection-status" class="status-badge status-local">ローカル</span>
    </header>

    <div class="container">
        
        <div class="flex-between" style="margin-bottom: 20px;">
            <h2 style="color: #1e3a8a; margin-top: 0; margin-bottom: 0;">本日のチーム状況</h2>
            <button class="btn btn-danger" onclick="clearAllData()">全データをリセット</button>
        </div>
        
        <!-- サマリー -->
        <div class="dashboard-summary">
            <div class="summary-card info-card">
                <div class="summary-title">本日 未入力の選手</div>
                <div class="summary-value" id="summary-missing-count">0 名</div>
                <div id="summary-missing-list" class="missing-list"></div>
            </div>
            <div class="summary-card alert-card">
                <div class="summary-title">本日 疲労度高(8以上)</div>
                <div class="summary-value" id="summary-fatigue">0 名</div>
            </div>
            <div class="summary-card warning-card">
                <div class="summary-title">本日 睡眠不足(6h未満)</div>
                <div class="summary-value" id="summary-sleep">0 名</div>
            </div>
        </div>

        <!-- グラフ -->
        <div class="card">
            <h3 class="section-title">選手別 推移グラフ</h3>
            <select id="chart-player-select" onchange="updateCharts(window.globalLogs)"></select>
            <div style="margin-bottom: 40px;"><canvas id="loadChart"></canvas></div>
            <div><canvas id="rsiChart"></canvas></div>
        </div>

        <!-- テーブル -->
        <div class="card table-responsive">
            <div class="flex-between" style="margin-bottom: 15px;">
                <h3 class="section-title" style="margin-bottom: 0; border: none;">全データ一覧履歴</h3>
                <!-- 【追加】CSVダウンロードボタン -->
                <button class="btn btn-success" onclick="downloadCSV()">📥 CSV (エクセル) で保存</button>
            </div>

            <!-- 【追加】絞り込み（フィルター）機能 -->
            <div class="filter-area">
                <input type="text" id="search-input" placeholder="🔍 選手名や日付(例: 2023-10)で検索..." oninput="filterAndRenderTable()">
            </div>

            <table id="admin-table">
                <thead>
                    <tr>
                        <th>日付</th>
                        <th>選手名</th>
                        <th>疲労</th>
                        <th>Load</th>
                        <th>RSI</th>
                        <th>筋肉痛・張り</th>
                        <th>睡眠</th>
                        <th>ケガ・違和感</th>
                    </tr>
                </thead>
                <tbody><!-- JavaScriptで挿入 --></tbody>
            </table>
        </div>
    </div>

    <!-- Firebase Classic -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        // ⭐️【最重要】ここにFirebaseの設定を貼り付けてください ⭐️
        const myFirebaseConfig = {
  apiKey: "AIzaSyAQoESOlZIGJfOgfIwpkL0r0YcYu4tl8ZQ",
  authDomain: "team-conditioning-controling.firebaseapp.com",
  projectId: "team-conditioning-controling",
  storageBucket: "team-conditioning-controling.firebasestorage.app",
  messagingSenderId: "330203393971",
  appId: "1:330203393971:web:f47b8e66137d0fce8b65c6",
  measurementId: "G-SCMMTXKZ37"
};

        window.globalLogs = []; 
        window.filteredLogs = []; // 絞り込み後のデータを保持する変数
        let loadChartInstance = null;
        let rsiChartInstance = null;

        async function initFirebase() {
            let colRef = null;
            if (myFirebaseConfig.apiKey !== "API_KEY") {
                firebase.initializeApp(myFirebaseConfig);
                const db = firebase.firestore();
                await firebase.auth().signInAnonymously();
                colRef = db.collection('team_condition_logs');
                document.getElementById('connection-status').textContent = 'クラウド同期中';
                document.getElementById('connection-status').className = 'status-badge status-cloud';
            }

            if (colRef) {
                colRef.onSnapshot((snapshot) => {
                    const logs = [];
                    snapshot.forEach(doc => logs.push(doc.data()));
                    logs.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
                    window.globalLogs = logs;
                    updateAdminUI(logs);
                });
            } else {
                const logs = JSON.parse(localStorage.getItem('team_condition_logs') || '[]');
                window.globalLogs = logs;
                updateAdminUI(logs);
            }
        }

        window.updateAdminUI = function(logs) {
            updateDashboardSummary(logs);
            updatePlayerSelect(logs);
            updateCharts(logs);
            filterAndRenderTable(); // テーブルはフィルター機能を経由して描画する
        };

        function getTodayString() {
            const d = new Date();
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function updateDashboardSummary(logs) {
            const todayStr = getTodayString();
            const allPlayers = [...new Set(logs.map(log => log.playerName).filter(name => name))];
            const todayLogs = logs.filter(log => log.date === todayStr);
            const todayPlayers = [...new Set(todayLogs.map(log => log.playerName))];
            const missingPlayers = allPlayers.filter(p => !todayPlayers.includes(p));

            document.getElementById('summary-missing-count').textContent = `${missingPlayers.length} 名`;
            document.getElementById('summary-missing-list').textContent = missingPlayers.length > 0 ? missingPlayers.join(', ') : '全員完了！✨';
            document.getElementById('summary-fatigue').textContent = `${todayLogs.filter(log => parseInt(log.fatigue) >= 8).length} 名`;
            document.getElementById('summary-sleep').textContent = `${todayLogs.filter(log => parseFloat(log.sleep) < 6).length} 名`;
        }

        function updatePlayerSelect(logs) {
            const select = document.getElementById('chart-player-select');
            const currentVal = select.value; 
            const players = [...new Set(logs.map(log => log.playerName).filter(name => name))];

            select.innerHTML = '<option value="">選手を選択してください</option>';
            players.forEach(player => {
                const option = document.createElement('option');
                option.value = player;
                option.textContent = player;
                if (player === currentVal) option.selected = true;
                select.appendChild(option);
            });
            if (!select.value && players.length > 0) select.value = players[0];
        }

        function updateCharts(logs) {
            if (typeof Chart === 'undefined') return; 
            const select = document.getElementById('chart-player-select');
            const playerName = select.value;
            if (!playerName) return;

            const playerLogs = logs.filter(log => log.playerName === playerName);
            const labels = playerLogs.map(log => log.date ? log.date.substring(5) : '不明'); 
            const loadData = playerLogs.map(log => parseFloat(log.trainingLoad) || 0);
            const fatigueData = playerLogs.map(log => parseFloat(log.fatigue) || 0);
            const rsiData = playerLogs.map(log => parseFloat(log.rsi) || 0);

            const ctxLoad = document.getElementById('loadChart').getContext('2d');
            if (loadChartInstance) loadChartInstance.destroy(); 
            loadChartInstance = new Chart(ctxLoad, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Training Load', data: loadData, borderColor: '#2563eb', backgroundColor: '#2563eb', yAxisID: 'y' },
                        { label: '疲労度', data: fatigueData, borderColor: '#dc2626', backgroundColor: '#dc2626', borderDash: [5, 5], yAxisID: 'y1' }
                    ]
                },
                options: { responsive: true, plugins: { title: { display: true, text: 'Training Load と 疲労度の推移' } }, scales: { y: { beginAtZero: true }, y1: { position: 'right', min: 0, max: 10, grid: { drawOnChartArea: false } } } }
            });

            const ctxRsi = document.getElementById('rsiChart').getContext('2d');
            if (rsiChartInstance) rsiChartInstance.destroy();
            rsiChartInstance = new Chart(ctxRsi, {
                type: 'line',
                data: { labels: labels, datasets: [{ label: 'RSI', data: rsiData, borderColor: '#10b981', backgroundColor: 'rgba(16, 185, 129, 0.2)', fill: true, tension: 0.2 }] },
                options: { responsive: true, plugins: { title: { display: true, text: 'RSI の推移' } }, scales: { y: { beginAtZero: true } } }
            });
        }

        // 【追加】絞り込み（フィルター）機能
        function filterAndRenderTable() {
            const searchText = document.getElementById('search-input').value.toLowerCase();
            const logs = window.globalLogs || [];

            // 検索文字が含まれている行だけを残す
            window.filteredLogs = logs.filter(log => {
                const name = (log.playerName || '').toLowerCase();
                const date = (log.date || '').toLowerCase();
                return name.includes(searchText) || date.includes(searchText);
            });

            renderAdminTable(window.filteredLogs);
        }

        function renderAdminTable(logsToRender) {
            const tableBody = document.querySelector('#admin-table tbody');
            tableBody.innerHTML = '';
            if (!logsToRender || logsToRender.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="8" style="text-align:center;">記録が見つかりません。</td></tr>';
                return;
            }
            
            const displayLogs = [...logsToRender].reverse();
            
            displayLogs.forEach(function(log) {
                const tr = document.createElement('tr');
                const fatigueText = (parseInt(log.fatigue) >= 8) ? `<span class="alert-text">${log.fatigue} ⚠️</span>` : (log.fatigue || '-');
                
                let sorenessHtml = '';
                if (log.soreness) {
                    const parts = log.soreness.split(',');
                    parts.forEach(part => {
                        if(part.trim()) sorenessHtml += `<span class="tag-text">${part.trim()}</span>`;
                    });
                }

                tr.innerHTML = `
                    <td>${log.date || ''}</td>
                    <td style="font-weight:bold;">${log.playerName || ''}</td>
                    <td>${fatigueText}</td>
                    <td>${log.trainingLoad && log.trainingLoad !== '-' ? log.trainingLoad : ''}</td>
                    <td>${log.rsi && log.rsi !== '-' ? log.rsi : ''}</td>
                    <td>${sorenessHtml}</td>
                    <td>${log.sleep || ''}</td>
                    <td style="color:#dc2626;">${log.injury || ''}</td>
                `;
                tableBody.appendChild(tr);
            });
        }

        // 【追加】CSVダウンロード機能
        function downloadCSV() {
            const logs = window.filteredLogs || [];
            if (logs.length === 0) {
                alert("ダウンロードするデータがありません。");
                return;
            }

            // Excelで文字化けしないための魔法の文字（BOM）
            let csvContent = '\uFEFF'; 
            
            // CSVの見出し
            const headers = ['日付', '選手名', '疲労度', 'TrainingLoad', 'RSI', 'F-v診断', '筋肉痛', '睡眠時間', 'ケガ', 'メニュー', '感想', 'できたこと', '課題'];
            csvContent += headers.join(',') + '\n';

            // 古い順になっているので、最新が上になるように逆順にする
            const exportLogs = [...logs].reverse();

            // データをカンマ区切りで追加していく
            exportLogs.forEach(log => {
                const row = [
                    log.date, log.playerName, log.fatigue, log.trainingLoad, log.rsi, log.fvResult,
                    log.soreness, log.sleep, log.injury, log.menu, log.thoughts, log.good, log.bad
                ].map(item => {
                    // 文章の中に改行やカンマが含まれていても表が崩れないようにする処理
                    const text = String(item || '').replace(/"/g, '""').replace(/\n/g, ' ');
                    return `"${text}"`;
                });
                csvContent += row.join(',') + '\n';
            });

            // ファイルとしてダウンロードさせる処理
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = url;
            link.download = `コンディション記録_${getTodayString()}.csv`;
            link.style.display = "none";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function clearAllData() {
            if(confirm("本当にすべてのデータを削除しますか？\n(※この操作は元に戻せません)")) {
                localStorage.removeItem('team_condition_logs');
                window.location.reload();
            }
        }

        initFirebase();
    </script>
</body>
</html>
